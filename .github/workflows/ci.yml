name: ci
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run seed
      - run: npm run simulate
      - name: smoke test the server
        run: |
          npm start &
          sleep 4
          curl -sf http://localhost:3000/api/health
          curl -sf http://localhost:3000/api/bonds | head -c 200
